name: csv-validate

on:
  pull_request:
    paths:
      - "data/products.csv"
      - "scripts/import-products.mjs"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate products CSV (dry run, no DB)
        run: node scripts/import-products.mjs --dry
