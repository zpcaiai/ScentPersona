# Standalone WebSocket push service. Point the Next app at it with:
#   WS_PUBLISH_URL=http://ws:3001  (server-side)
#   NEXT_PUBLIC_WS_URL=wss://ws.your-domain.com  (client, behind TLS)
services:
  ws:
    build:
      context: .
      dockerfile: Dockerfile.ws
    ports:
      - "3001:3001"
    environment:
      WS_PORT: "3001"
      WS_PUBLISH_SECRET: "${WS_PUBLISH_SECRET:-change-me}"
    restart: unless-stopped
